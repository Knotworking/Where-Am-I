# Detekt configuration for WhereAmI
# buildUponDefaultConfig = true, so only overrides are listed here.

naming:
  MatchingDeclarationName:
    mustBeFirst: false
    # Navigation files contain multiple top-level declarations (route + graph extension)
    excludes: ['**/*Navigation.kt']
  FunctionNaming:
    # Allow Composable functions (PascalCase)
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

complexity:
  LongMethod:
    # Composables tend to be long
    threshold: 80
  LongParameterList:
    # Composables often have many parameters
    functionThreshold: 8
    constructorThreshold: 8

style:
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '0.5'
      - '360'
      - '180'
      - '90'
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'